# Cloud Build: build + push to Artifact Registry (set trigger to use this file).
# Create repo first, e.g. gcloud artifacts repositories create cloud-run-source-deploy \
#   --repository-format=docker --location=REGION
#
# Override in trigger: _REGION, _AR_REPOSITORY, _IMAGE_NAME as needed.

substitutions:
  _REGION: us-central1
  _AR_REPOSITORY: cloud-run-source-deploy
  _IMAGE_NAME: alubee-plan-fetcher

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest'
      - .

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
